<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Question</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            height: 100vh;
            width: 100%;
            align-items: center;
            background-color: antiquewhite;
        }

        .Quiz-container {
            background-color: #fff;
            padding: 10rem;
            border-radius: 15px;
            font-size: 24px;
        }

        .btn {
            display: flex;
            flex-direction: column;
        }

        .Prev-Next-button {
            display: flex;
            justify-content: space-evenly;
        }
    </style>
</head>

<body>

    <div class="Quiz-container">

        <h3 class="text-center mb-4">Quiz App</h3>

        <div class="d-flex justify-content-between mb-3 ">
            <span>Question
                <span id="QNumber">1</span>
                <span>/10</span>


                <span>Score: <span id="score">0</span></span>
        </div>

        <div class="mb-4">
            <h5 id="question">
                What does HTML stand for?
            </h5>
        </div>

        <div class="options">
            <button class="btn btn-outline-primary w-100 mb-2 option">option 1</button>

            <button class="btn btn-outline-primary w-100 mb-2 option">option 2</button>

            <button class="btn btn-outline-primary w-100 mb-2 option">option 3</button>

            <button class="btn btn-outline-primary w-100 mb-2 option">option 4</button>
        </div>

        <div class="Prev-Next-button  mt-4">
            <button class="btn btn-secondary" id="Previous">Previous</button>
            <button class="btn btn-primary" id="Next">Next</button>
        </div>

    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"> </script>

    <script>

        let CurrentQuestion = 0;


        $("#Next").click(function () {
            if (CurrentQuestion<10) {
                CurrentQuestion++;
                $("#QNumber").text(CurrentQuestion);

                loadQuestion();
            }
        })

        $("#Previous").click(function(){
            if(CurrentQuestion>0){
                CurrentQuestion--;
                $("#QNumber").text(CurrentQuestion);
                loadQuestion();
            }
        })

        

        const quiz = [
            {
                question: "What does HTML stand for?",
                options: ["Hyper Text Markup Language", "High Text Machine Language", "Hyperlinks Text Language", "None"],
                answer: 0
            },

            {
                question: "CSS stands for?",
                options: ["Creative Style Sheet", "Cascading Style Sheets", "Computer Style Sheet", "Color Style Sheet"],
                answer: 1
            },

            {
                question: "Which language is used to make a webpage interactive?",
                options: ["HTML","CSS","JavaScript","SQL"],
                answer: 2
            },

            {
                question: "Which tag is used to create a hyperlink in HTML?",
                options: ["<link>","<a>","<href>","<h1>"],
                answer: 1
            },

            {
                question: "Which CSS property changes the text color?",
                options: ["font-color","background-color","color","text-style"],
                answer: 2
            },

            {
                question: "Which company developed JavaScript?",
                options: ["Microsoft","Netscape","Google","Apple"],
                answer: 1
            },

            {
                question: "Which symbol is used for comments in JavaScript?",
                options: ["//","**","##","<!-- -->"],
                answer: 0
            },

            {
                question: "Which method is used to print in the browser console?",
                options: ["console.print()","console.log()","print()","document.write()"
                ],
                answer: 1
            },

            {
                question: "Which HTML tag is used to insert an image?",
                options: ["<picture>","<img>","<image>","<src>"],
                answer: 1
            },

            {
                question: "Which keyword is used to declare a variable in JavaScript?",
                options: ["var","let","const","All of the above"],
                answer: 3
            }
        ];

        function loadQuestion(){
            $("#question").text(quiz.question);

              for (let i = 0; i < 4; i++) {
        $(".option").eq(i).text(quiz[CurrentQuestion].options[i]);
    }
        }



        let score = 0;
        
        $(".option").click(function(){

            let select = $(".option").index(this);

            if(select === quiz[CurrentQuestion].answer){
                score++;
                $("#score").text(score);
                alert("Correct Answer");
            }
            else {
                alert("Wrong Answer")
            }

        })


    </script>

</body>

</html>
